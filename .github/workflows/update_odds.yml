name: Update Odds Data

on:
  schedule:
    # 每 3 小時執行一次 (UTC 時間)
    - cron: '0 */3 * * *'
  workflow_dispatch: # 允許手動觸發

permissions:
  contents: write

jobs:
  fetch-and-analyze:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run odds fetcher
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          ODDS_API_KEY_2: ${{ secrets.ODDS_API_KEY_2 }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/fetch_odds.py

      - name: Commit and push data
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "Odds Bot"
          git add data/
          git diff --staged --quiet || git commit -m "📊 Update odds data - $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
