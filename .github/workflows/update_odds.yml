name: Update Odds Data

on:
  schedule:
    # 每 3 小時執行一次 (UTC 時間)
    - cron: '0 */3 * * *'
  workflow_dispatch:
    inputs:
      debug_skip_odds:
        description: '跳過 Odds API 呼叫，用快取資料測試 AI (省 API 額度)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

permissions:
  contents: write

jobs:
  fetch-and-analyze:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run odds fetcher
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          ODDS_API_KEY_2: ${{ secrets.ODDS_API_KEY_2 }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          # 相容兩種 Secret 命名: GEMINI_API_KEY_2 或 GEMINI_API_KEY2
          GEMINI_API_KEY_2: ${{ secrets.GEMINI_API_KEY_2 }}
          GEMINI_API_KEY2: ${{ secrets.GEMINI_API_KEY2 }}
          # 第三把 Key (選填，有設定才生效)
          GEMINI_API_KEY_3: ${{ secrets.GEMINI_API_KEY_3 }}
          DEBUG_SKIP_ODDS: ${{ github.event.inputs.debug_skip_odds || 'false' }}
        run: python scripts/fetch_odds.py

      - name: Commit and push data
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "Odds Bot"
          git add data/
          git diff --staged --quiet || git commit -m "📊 Update odds data - $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
